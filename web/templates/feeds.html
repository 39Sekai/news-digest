<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Digest - Feed Management</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="logo">📰</span>
            <span>News Digest</span>
        </div>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/feeds" class="active">Feeds</a></li>
            <li><a href="/briefs">Briefs</a></li>
            <li><a href="/settings">Settings</a></li>
        </ul>
        <div class="nav-status" id="systemStatus">
            <span class="status-dot healthy"></span>
            <span class="status-text">Healthy</span>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h1>Feed Management</h1>
            <div class="header-actions">
                <button class="btn btn-secondary" id="importFeedsBtn">📁 Import</button>
                <button class="btn btn-primary" id="addFeedBtn">+ Add Feed</button>
            </div>
        </header>

        <!-- Filters -->
        <section class="filters">
            <div class="filter-group">
                <label for="statusFilter">Status:</label>
                <select id="statusFilter">
                    <option value="">All</option>
                    <option value="healthy">Healthy</option>
                    <option value="stale">Stale</option>
                    <option value="broken">Broken</option>
                    <option value="disabled">Disabled</option>
                </select>
            </div>
            <div class="filter-group">
                <label for="categoryFilter">Category:</label>
                <select id="categoryFilter">
                    <option value="">All</option>
                    <option value="tech">Tech</option>
                    <option value="ai">AI/ML</option>
                    <option value="security">Security</option>
                </select>
            </div>
            <div class="filter-group search">
                <input type="text" id="searchFeeds" placeholder="Search feeds...">
            </div>
        </section>

        <!-- Feed List -->
        <section class="feed-list" id="feedList">
            <div class="loading">Loading feeds...</div>
        </section>
    </main>

    <!-- Add Feed Modal -->
    <div class="modal" id="addFeedModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Feed</h3>
                <button class="close-btn" id="closeAddModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addFeedForm">
                    <div class="form-group">
                        <label for="feedUrl">RSS Feed URL *</label>
                        <input type="url" id="feedUrl" required placeholder="https://example.com/feed.xml">
                    </div>
                    <div class="form-group">
                        <label for="feedName">Feed Name *</label>
                        <input type="text" id="feedName" required placeholder="Example Blog">
                    </div>
                    <div class="form-group">
                        <label for="feedCategory">Category</label>
                        <select id="feedCategory">
                            <option value="tech">Tech</option>
                            <option value="ai">AI/ML</option>
                            <option value="security">Security</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelAdd">Cancel</button>
                        <button type="submit" class="btn btn-primary">Add Feed</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Import Feeds Modal -->
    <div class="modal" id="importFeedsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Import Feeds from File</h3>
                <button class="close-btn" id="closeImportModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="importFeedsForm">
                    <div class="form-group">
                        <label for="importFile">Select File *</label>
                        <input type="file" id="importFile" accept=".json,.opml,.xml" required>
                        <p class="help-text">Supported formats: JSON (feeds.json), OPML, RSS</p>
                    </div>
                    <div class="form-group">
                        <label for="importCategory">Default Category</label>
                        <select id="importCategory">
                            <option value="tech">Tech</option>
                            <option value="ai">AI/ML</option>
                            <option value="security">Security</option>
                            <option value="general">General</option>
                        </select>
                    </div>
                    <div class="import-preview" id="importPreview">
                        <p class="placeholder">Select a file to preview feeds...</p>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelImport">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="confirmImport" disabled>Import Feeds</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/static/js/feeds.js"></script>
    <script src="/static/js/common.js"></script>
</body>
</html>
